<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Rich Review</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-width: 260px;
      padding: 14px 16px 16px;
      background: #fff;
      color: #24292f;
      font-size: 13px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .label {
      font-weight: 600;
    }

    select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 6px 8px;
      background: #fff;
      color: inherit;
      font: inherit;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .hint {
      color: #57606a;
      font-size: 12px;
      line-height: 1.35;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0d1117;
        color: #c9d1d9;
      }

      select {
        border-color: #30363d;
        background: #161b22;
        color: #c9d1d9;
      }

      .hint {
        color: #8b949e;
      }
    }
  </style>
</head>
<body>
    <div class="stack">
    <label class="check" for="extension-enabled">
      <input id="extension-enabled" type="checkbox">
      <span>Extension enabled</span>
    </label>

    <div class="field">
      <div class="label">Theme</div>
      <select id="theme-mode">
        <option value="auto">Auto</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <label class="check" for="smooth-scroll">
      <input id="smooth-scroll" type="checkbox">
      <span>Smooth scrolling</span>
    </label>

    <div class="hint">Theme defaults to GitHub auto-detection.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
