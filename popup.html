<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Rich Review</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-width: 220px;
      padding: 14px 16px;
      background: #fff;
      color: #24292f;
      font-size: 13px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .hint {
      margin-top: 10px;
      color: #57606a;
      font-size: 12px;
      line-height: 1.35;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0d1117;
        color: #c9d1d9;
      }

      .hint {
        color: #8b949e;
      }
    }
  </style>
</head>
<body>
  <div class="row">
    <label for="smooth-scroll">
      <input id="smooth-scroll" type="checkbox">
      <span>Smooth scrolling</span>
    </label>
  </div>
  <div class="hint">Toggle between smooth and instant scroll behavior.</div>
  <script src="popup.js"></script>
</body>
</html>
